name: Refresh GitHub Stats

on:
  schedule:
    - cron: "0 2 * * *"   # todo dia às 2h UTC
  workflow_dispatch:       # permite rodar manualmente na aba Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats image
        uses: anuraghazra/github-readme-stats@v1
        with:
          username: igor-mrs
          show_icons: true
          theme: tokyonight
          hide_border: true
          include_all_commits: true
          rank_icon: github
          output: stats.svg

      - name: Generate languages image
        uses: anuraghazra/github-readme-stats@v1
        with:
          username: igor-mrs
          layout: compact
          langs_count: 8
          theme: tokyonight
          hide_border: true
          output: languages.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg languages.svg
          git diff --staged --quiet || git commit -m "📊 update stats"
          git push